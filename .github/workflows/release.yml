name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --add-data "favicon.ico;." --icon=favicon.ico session_window_manager.pyw

      - name: Get tag name
        id: tag
        run: echo "TAG_NAME=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: Release ${{ steps.tag.outputs.TAG_NAME }}
          body: |
            ## 視窗佈局管理員 ${{ steps.tag.outputs.TAG_NAME }}

            ### 下載
            下載下方的 `session_window_manager.exe` 即可直接執行，無需安裝 Python。

            ### 系統需求
            - Windows 10 / 11
          files: dist/session_window_manager.exe
          draft: false
          prerelease: false
